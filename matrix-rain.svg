<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" width="840" height="500">
  <defs>
    <filter id="glow-g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-c" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-m" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="big-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#010409"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41"/><stop offset="30%" style="stop-color:#00ffaa"/><stop offset="60%" style="stop-color:#00d4ff"/><stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0"/><stop offset="50%" style="stop-color:#00ff41;stop-opacity:0.6"/><stop offset="100%" style="stop-color:#00ff41;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00aa;stop-opacity:0"/><stop offset="50%" style="stop-color:#ff00aa;stop-opacity:0.4"/><stop offset="100%" style="stop-color:#ff00aa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <style>
    .r { font-family: 'Courier New', monospace; font-size: 12px; }
    @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  </style>

  <!-- Background -->
  <rect width="840" height="500" fill="url(#bg)" rx="10"/>

  <!-- Double border -->
  <rect x="2" y="2" width="836" height="496" rx="10" fill="none" stroke="#00ff41" stroke-width="1" stroke-opacity="0.15"/>
  <rect x="6" y="6" width="828" height="488" rx="8" fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Corner accents -->
  <path d="M20,8 L8,8 L8,20" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M820,8 L832,8 L832,20" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M20,492 L8,492 L8,480" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M820,492 L832,492 L832,480" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- ========== MATRIX RAIN COLUMNS ========== -->

  <!-- Layer 1: Bright foreground rain -->
  <g class="r" fill="#00ff41" opacity="0.35">
    <text x="20" y="0"><animate attributeName="y" from="-180" to="700" dur="5.5s" repeatCount="indefinite" begin="0s"/>LangGraph</text>
    <text x="95" y="0"><animate attributeName="y" from="-300" to="700" dur="6.2s" repeatCount="indefinite" begin="0.8s"/>FastAPI</text>
    <text x="160" y="0"><animate attributeName="y" from="-100" to="700" dur="4.8s" repeatCount="indefinite" begin="1.5s"/>RAG</text>
    <text x="205" y="0"><animate attributeName="y" from="-250" to="700" dur="7s" repeatCount="indefinite" begin="0.3s"/>chromadb</text>
    <text x="290" y="0"><animate attributeName="y" from="-150" to="700" dur="5.8s" repeatCount="indefinite" begin="2s"/>agent</text>
    <text x="350" y="0"><animate attributeName="y" from="-350" to="700" dur="6.5s" repeatCount="indefinite" begin="0.5s"/>Docker</text>
    <text x="420" y="0"><animate attributeName="y" from="-200" to="700" dur="5.2s" repeatCount="indefinite" begin="1.2s"/>Python</text>
    <text x="490" y="0"><animate attributeName="y" from="-280" to="700" dur="6.8s" repeatCount="indefinite" begin="1.8s"/>Kafka</text>
    <text x="545" y="0"><animate attributeName="y" from="-120" to="700" dur="5s" repeatCount="indefinite" begin="0.6s"/>Go</text>
    <text x="580" y="0"><animate attributeName="y" from="-320" to="700" dur="7.2s" repeatCount="indefinite" begin="2.2s"/>React</text>
    <text x="640" y="0"><animate attributeName="y" from="-170" to="700" dur="5.6s" repeatCount="indefinite" begin="1s"/>GCP</text>
    <text x="690" y="0"><animate attributeName="y" from="-400" to="700" dur="6s" repeatCount="indefinite" begin="0.4s"/>AWS</text>
    <text x="740" y="0"><animate attributeName="y" from="-220" to="700" dur="5.4s" repeatCount="indefinite" begin="1.6s"/>MLflow</text>
    <text x="800" y="0"><animate attributeName="y" from="-290" to="700" dur="6.4s" repeatCount="indefinite" begin="2.5s"/>dbt</text>
  </g>

  <!-- Layer 2: Bright head characters (white-green) -->
  <g class="r" fill="#aaffaa" filter="url(#glow-g)" opacity="0.5">
    <text x="20" y="0"><animate attributeName="y" from="-60" to="700" dur="5.5s" repeatCount="indefinite" begin="0s"/>></text>
    <text x="95" y="0"><animate attributeName="y" from="-180" to="700" dur="6.2s" repeatCount="indefinite" begin="0.8s"/>_</text>
    <text x="160" y="0"><animate attributeName="y" from="-20" to="700" dur="4.8s" repeatCount="indefinite" begin="1.5s"/>|</text>
    <text x="290" y="0"><animate attributeName="y" from="-30" to="700" dur="5.8s" repeatCount="indefinite" begin="2s"/>$</text>
    <text x="420" y="0"><animate attributeName="y" from="-80" to="700" dur="5.2s" repeatCount="indefinite" begin="1.2s"/>></text>
    <text x="545" y="0"><animate attributeName="y" from="-10" to="700" dur="5s" repeatCount="indefinite" begin="0.6s"/>_</text>
    <text x="690" y="0"><animate attributeName="y" from="-280" to="700" dur="6s" repeatCount="indefinite" begin="0.4s"/>|</text>
    <text x="800" y="0"><animate attributeName="y" from="-170" to="700" dur="6.4s" repeatCount="indefinite" begin="2.5s"/>></text>
  </g>

  <!-- Layer 3: Dim mid-layer rain -->
  <g class="r" fill="#004d14" opacity="0.3">
    <text x="55" y="0"><animate attributeName="y" from="-200" to="700" dur="8s" repeatCount="indefinite" begin="2s"/>retrieval</text>
    <text x="130" y="0"><animate attributeName="y" from="-350" to="700" dur="9s" repeatCount="indefinite" begin="0.5s"/>webhook</text>
    <text x="245" y="0"><animate attributeName="y" from="-150" to="700" dur="8.5s" repeatCount="indefinite" begin="1.5s"/>deploy</text>
    <text x="320" y="0"><animate attributeName="y" from="-400" to="700" dur="7.5s" repeatCount="indefinite" begin="2.5s"/>stream</text>
    <text x="390" y="0"><animate attributeName="y" from="-280" to="700" dur="9.5s" repeatCount="indefinite" begin="0.8s"/>OpenAI</text>
    <text x="460" y="0"><animate attributeName="y" from="-100" to="700" dur="8.2s" repeatCount="indefinite" begin="1.8s"/>embed</text>
    <text x="520" y="0"><animate attributeName="y" from="-330" to="700" dur="7.8s" repeatCount="indefinite" begin="3s"/>vector</text>
    <text x="610" y="0"><animate attributeName="y" from="-180" to="700" dur="8.8s" repeatCount="indefinite" begin="0.3s"/>index</text>
    <text x="670" y="0"><animate attributeName="y" from="-420" to="700" dur="9.2s" repeatCount="indefinite" begin="1.2s"/>FAISS</text>
    <text x="760" y="0"><animate attributeName="y" from="-260" to="700" dur="8.6s" repeatCount="indefinite" begin="2.2s"/>parse</text>
  </g>

  <!-- Layer 4: Very faint deep background -->
  <g class="r" fill="#002a0a" opacity="0.2">
    <text x="40" y="0"><animate attributeName="y" from="-300" to="700" dur="11s" repeatCount="indefinite" begin="0s"/>SageMaker</text>
    <text x="180" y="0"><animate attributeName="y" from="-150" to="700" dur="10s" repeatCount="indefinite" begin="1s"/>Snowflake</text>
    <text x="310" y="0"><animate attributeName="y" from="-450" to="700" dur="12s" repeatCount="indefinite" begin="2s"/>BigQuery</text>
    <text x="440" y="0"><animate attributeName="y" from="-200" to="700" dur="10.5s" repeatCount="indefinite" begin="0.5s"/>Airflow</text>
    <text x="560" y="0"><animate attributeName="y" from="-380" to="700" dur="11.5s" repeatCount="indefinite" begin="1.5s"/>Spark</text>
    <text x="700" y="0"><animate attributeName="y" from="-250" to="700" dur="10.8s" repeatCount="indefinite" begin="2.5s"/>Redis</text>
    <text x="130" y="0"><animate attributeName="y" from="-500" to="700" dur="13s" repeatCount="indefinite" begin="3s"/>Pinecone</text>
    <text x="370" y="0"><animate attributeName="y" from="-320" to="700" dur="11.8s" repeatCount="indefinite" begin="0.8s"/>Lambda</text>
    <text x="500" y="0"><animate attributeName="y" from="-180" to="700" dur="12.5s" repeatCount="indefinite" begin="1.8s"/>Vertex</text>
    <text x="620" y="0"><animate attributeName="y" from="-400" to="700" dur="10.2s" repeatCount="indefinite" begin="3.5s"/>k8s</text>
    <text x="770" y="0"><animate attributeName="y" from="-280" to="700" dur="11.2s" repeatCount="indefinite" begin="0.3s"/>torch</text>
  </g>

  <!-- ========== CENTRAL IDENTITY PANEL ========== -->

  <!-- Panel backdrop with gradient border -->
  <rect x="100" y="115" width="640" height="270" rx="8" fill="#010409" fill-opacity="0.92" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.5s" fill="freeze"/>
  </rect>
  <!-- Panel border glow -->
  <rect x="100" y="115" width="640" height="270" rx="8" fill="none" stroke="#00ff41" stroke-width="1" stroke-opacity="0" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.5s" fill="freeze"/>
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Inner border -->
  <rect x="104" y="119" width="632" height="262" rx="6" fill="none" stroke="#00ff41" stroke-width="0.3" stroke-opacity="0" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.5s" fill="freeze"/>
    <animate attributeName="stroke-opacity" from="0" to="0.15" dur="0.8s" begin="1.5s" fill="freeze"/>
  </rect>

  <!-- Top decorative line -->
  <line x1="130" y1="140" x2="710" y2="140" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </line>

  <!-- Boot text -->
  <text x="420" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#00ff41" letter-spacing="3px" opacity="0">
    SYSTEM BOOT // IDENTITY MATRIX v3.0 // NEURAL LINK ACTIVE
    <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" begin="2s" fill="freeze"/>
  </text>

  <!-- ===== NAME: Single centered text ===== -->
  <text x="420" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="url(#nameGrad)" filter="url(#big-glow)" letter-spacing="8px" opacity="0">
    NAGENDHRA
    <animate attributeName="opacity" values="0;0.3;1;0.8;1" dur="0.6s" begin="2.5s" fill="freeze"/>
  </text>
  <!-- Name shadow/echo for depth -->
  <text x="420" y="210" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#00ff41" opacity="0" filter="url(#glow-g)" letter-spacing="8px">
    NAGENDHRA
    <animate attributeName="opacity" values="0;0.15" dur="0.6s" begin="2.5s" fill="freeze"/>
  </text>

  <!-- Decorative line under name -->
  <line x1="200" y1="225" x2="640" y2="225" stroke="url(#lineGrad)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" dur="0.4s" begin="3.1s" fill="freeze"/>
  </line>

  <!-- Title -->
  <text x="420" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#00d4ff" filter="url(#glow-c)" letter-spacing="4px" opacity="0">
    AI ENGINEER  //  SYSTEMS ARCHITECT
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.3s" fill="freeze"/>
  </text>

  <!-- OpenClaw line with pink accent -->
  <line x1="220" y1="268" x2="620" y2="268" stroke="url(#lineGrad2)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.8s" fill="freeze"/>
  </line>
  <text x="420" y="285" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ff00aa" font-weight="bold" filter="url(#glow-m)" letter-spacing="2px" opacity="0">
    BUILDING OPENCLAW // NO LLM CALLS // USERS TEACH IT
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" begin="4.5s" repeatCount="indefinite"/>
  </text>

  <!-- ===== STATS ROW ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="4.5s" fill="freeze"/>

    <!-- Stat divider line -->
    <line x1="150" y1="305" x2="690" y2="305" stroke="#00ff41" stroke-width="0.3" stroke-opacity="0.2"/>

    <!-- Stat: REPOS -->
    <text x="185" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#556677" letter-spacing="2px">REPOS</text>
    <text x="185" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#00ff41" font-weight="bold" filter="url(#glow-g)">12</text>

    <!-- Stat: STARS -->
    <text x="295" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#556677" letter-spacing="2px">STARS</text>
    <text x="295" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#ffd700" font-weight="bold" filter="url(#glow-gold)">42+</text>

    <!-- Stat: EXPERIENCE -->
    <text x="405" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#556677" letter-spacing="2px">EXPERIENCE</text>
    <text x="405" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#00d4ff" font-weight="bold" filter="url(#glow-c)">4+ YRS</text>

    <!-- Stat: PREV -->
    <text x="530" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#556677" letter-spacing="2px">PREVIOUS</text>
    <text x="530" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#ff00aa" font-weight="bold" filter="url(#glow-m)">GOLDMAN</text>

    <!-- Stat: LOCATION -->
    <text x="655" y="325" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#556677" letter-spacing="2px">LOCATION</text>
    <text x="655" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#a855f7" font-weight="bold">NYC</text>
  </g>

  <!-- Bottom divider -->
  <line x1="130" y1="365" x2="710" y2="365" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.5s" begin="5s" fill="freeze"/>
  </line>

  <!-- Terminal prompt -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="5.2s" fill="freeze"/>
    <text x="140" y="380" font-family="'Courier New', monospace" font-size="11" fill="#556677">nagendhra@ai:~$</text>
    <text x="310" y="380" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" filter="url(#glow-g)">./init --mode=build --target=openclaw</text>
    <rect x="605" y="369" width="8" height="14" fill="#00ff41">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Footer -->
  <text x="420" y="488" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#0a2a0a" letter-spacing="3px" opacity="0">
    IDENTITY MATRIX v3.0 // github.com/Nagendhra-web // ALL SYSTEMS NOMINAL
    <animate attributeName="opacity" from="0" to="0.35" dur="1s" begin="5.5s" fill="freeze"/>
  </text>
</svg>
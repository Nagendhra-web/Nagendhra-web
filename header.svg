<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#00ff41"/>
      <stop offset="100%" style="stop-color:#ff00aa"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </radialGradient>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff41" stroke-width="0.3" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <style>
    @keyframes typing {
      0% { width: 0; }
      40% { width: 520px; }
      60% { width: 520px; }
      80% { width: 0; }
      100% { width: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes typing2 {
      0% { width: 0; }
      20% { width: 0; }
      60% { width: 380px; }
      80% { width: 380px; }
      90% { width: 0; }
      100% { width: 0; }
    }
    @keyframes fadeSlide {
      0%, 100% { opacity: 0; transform: translateY(5px); }
      10%, 90% { opacity: 0.5; transform: translateY(0); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#bg)" rx="6"/>
  <rect width="800" height="120" fill="url(#grid)" rx="6"/>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="118" rx="6" fill="none" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Terminal prompt -->
  <text x="30" y="45" font-family="'Courier New', monospace" font-size="14" fill="#445566">visitor@nagendhra.ai:~$</text>

  <!-- Typing line 1: Name -->
  <g>
    <text x="30" y="75" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
      Hi, I'm Nagendhra Madishetti
    </text>
    <!-- Cursor -->
    <rect x="530" y="55" width="2" height="28" fill="#00ff41">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtitle cycling -->
  <g>
    <!-- Role 1 -->
    <text x="30" y="100" font-family="'Courier New', monospace" font-size="13" fill="#00d4ff" letter-spacing="1px" opacity="0">
      AI Engineer  //  Building Agentic Systems  //  Ex-Goldman Sachs
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="12s" keyTimes="0;0.01;0.05;0.45;0.5;1" repeatCount="indefinite"/>
    </text>
    <!-- Role 2 -->
    <text x="30" y="100" font-family="'Courier New', monospace" font-size="13" fill="#ff00aa" letter-spacing="1px" opacity="0">
      Open Source Builder  //  LangGraph + FastAPI  //  NYC
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="12s" keyTimes="0;0.5;0.55;0.95;0.99;1" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Decorative dots -->
  <circle cx="750" cy="20" r="4" fill="#ff5f56" opacity="0.6"/>
  <circle cx="765" cy="20" r="4" fill="#ffbd2e" opacity="0.6"/>
  <circle cx="780" cy="20" r="4" fill="#27c93f" opacity="0.6"/>
</svg>